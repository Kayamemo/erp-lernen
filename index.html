<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ERP Karten">
<title>ERP Lernkarten</title>
<style>
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#ebebea;
  --tx:#1a1a18;--tx2:#6b6b67;--tx3:#9b9b97;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --green:#085041;--green-bg:#E1F5EE;--green-mid:#0F6E56;
  --purple:#3C3489;--purple-bg:#EEEDFE;--purple-mid:#534AB7;
  --amber:#633806;--amber-bg:#FAEEDA;--amber-mid:#BA7517;
  --coral:#4A1B0C;--coral-bg:#FAECE7;--coral-mid:#D85A30;
  --red-t:#711B13;--blue:#0C447C;--blue-bg:#E6F1FB;
  --radius:16px;--radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --tx:#f2f2f7;--tx2:#aeaeb2;--tx3:#636366;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --green-bg:#0a2a22;--green:#9FE1CB;--green-mid:#1D9E75;
    --purple-bg:#1a1836;--purple:#AFA9EC;--purple-mid:#7F77DD;
    --amber-bg:#2a1e0a;--amber:#FAC775;--amber-mid:#EF9F27;
    --coral-bg:#2a1008;--coral:#F0997B;--coral-mid:#D85A30;
    --blue-bg:#0a1e36;--blue:#85B7EB;
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:var(--tx)}

.app{
  display:flex;flex-direction:column;height:100%;
  padding-top:max(var(--safe-top),20px);
  padding-bottom:max(var(--safe-bot),12px);
  padding-left:16px;padding-right:16px;
  max-width:430px;margin:0 auto;overflow:hidden;
}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-shrink:0}
.header-title{font-size:20px;font-weight:600;color:var(--tx)}
.header-count{font-size:13px;color:var(--tx2)}

/* CHAPTER PILLS */
.pills-wrap{overflow-x:auto;margin:0 -16px;padding:0 16px 8px;flex-shrink:0;-ms-overflow-style:none;scrollbar-width:none}
.pills-wrap::-webkit-scrollbar{display:none}
.pills{display:flex;gap:6px;width:max-content}
.pill{font-size:12px;font-weight:500;padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--tx2);white-space:nowrap;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.pill.active{border-color:transparent;color:#fff}

/* PROGRESS */
.prog-wrap{height:3px;background:var(--bg3);border-radius:3px;margin-bottom:10px;flex-shrink:0}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}

/* STATS ROW */
.stats{display:flex;gap:8px;margin-bottom:12px;flex-shrink:0}
.stat-box{flex:1;background:var(--bg2);border-radius:var(--radius-sm);padding:8px;text-align:center}
.stat-num{font-size:18px;font-weight:600;color:var(--tx);line-height:1.1}
.stat-lbl{font-size:10px;color:var(--tx2);margin-top:1px}

/* NAV ROW */
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0}
.nav-txt{font-size:13px;color:var(--tx2)}
.nav-btns{display:flex;gap:6px}
.nav-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--tx);-webkit-user-select:none;user-select:none}
.nav-btn:active{opacity:.6;transform:scale(.95)}

/* CARD */
.card-wrap{flex:1;perspective:1200px;cursor:pointer;min-height:0;margin-bottom:10px}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);display:flex;flex-direction:column;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
.card-back{transform:rotateY(180deg)}

/* FRONT */
.front-body{padding:20px;display:flex;flex-direction:column;height:100%;justify-content:space-between}
.card-tag{display:inline-block;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:14px;letter-spacing:.3px}
.card-q{font-size:17px;font-weight:500;color:var(--tx);line-height:1.5;flex:1;display:flex;align-items:center}
.card-hint{font-size:12px;color:var(--tx3);display:flex;align-items:center;gap:5px;margin-top:10px}

/* BACK */
.back-body{padding:16px;overflow-y:auto;height:100%;-webkit-overflow-scrolling:touch}
.back-body::-webkit-scrollbar{display:none}
.bsec{margin-bottom:12px}
.bsec-t{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--tx2);margin-bottom:5px;text-transform:uppercase}
.bdef{background:var(--bg2);border-radius:8px;padding:9px 11px;font-size:12.5px;color:var(--tx2);line-height:1.55}
.bdef strong{color:var(--tx);font-weight:500}
.bans{font-size:12.5px;color:var(--tx);line-height:1.6}
.bex{background:var(--bg2);border-radius:8px;padding:9px 11px;font-size:12px;color:var(--tx2);line-height:1.55;border-left:3px solid #1D9E75}

/* inline helpers */
.h{display:inline-block;border-radius:4px;padding:1px 5px;font-weight:500;font-size:11px;margin:1px}
.hg{background:var(--green-bg);color:var(--green)}
.hp{background:var(--purple-bg);color:var(--purple)}
.ha{background:var(--amber-bg);color:var(--amber)}
.hr{background:var(--coral-bg);color:var(--red-t)}
.hb{background:var(--blue-bg);color:var(--blue)}
.hc{background:var(--coral-bg);color:var(--coral)}
.br2{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}
.bg2{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:500}
.fl{display:flex;flex-direction:column;gap:3px}
.fs2{display:flex;align-items:flex-start;gap:6px;font-size:12px}
.fn{width:20px;height:20px;border-radius:50%;font-weight:600;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.fa{font-size:11px;color:var(--tx2);margin-left:26px}
.tb{width:100%;border-collapse:collapse;font-size:11.5px}
.tb th{text-align:left;font-weight:500;color:var(--tx2);padding:3px 5px;border-bottom:1px solid var(--border)}
.tb td{padding:3px 5px;border-bottom:1px solid var(--border);color:var(--tx)}
.fm{background:var(--bg2);border-radius:6px;padding:5px 10px;font-family:'Menlo',monospace;font-size:11px;color:var(--tx);text-align:center;margin:3px 0}

/* CONTROLS */
.controls{display:flex;gap:8px;flex-shrink:0}
.ctrl-btn{flex:1;padding:13px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg2);color:var(--tx);font-size:15px;font-weight:500;cursor:pointer;-webkit-user-select:none;user-select:none;transition:all .1s}
.ctrl-btn:active{transform:scale(.97);opacity:.8}
.ctrl-btn.primary{color:#fff;border-color:transparent}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="header-title">ERP Lernkarten</span>
    <span class="header-count" id="hcount">93 Karten</span>
  </div>

  <div class="pills-wrap"><div class="pills" id="pills"></div></div>

  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:1%"></div></div>

  <div class="stats">
    <div class="stat-box"><div class="stat-num" id="s-tot">0</div><div class="stat-lbl">Karten</div></div>
    <div class="stat-box"><div class="stat-num" id="s-kn">0</div><div class="stat-lbl">Gewusst</div></div>
    <div class="stat-box"><div class="stat-num" id="s-lft">0</div><div class="stat-lbl">Verbleibend</div></div>
  </div>

  <div class="nav-row">
    <span class="nav-txt" id="nav-txt">Karte 1 / 0</span>
    <div class="nav-btns">
      <div class="nav-btn" onclick="prev()" role="button" aria-label="Zurück">←</div>
      <div class="nav-btn" onclick="next()" role="button" aria-label="Weiter">→</div>
    </div>
  </div>

  <div class="card-wrap" onclick="flip()" role="button" aria-label="Karte umdrehen">
    <div class="card-inner" id="card">
      <div class="card-face card-front">
        <div class="front-body" id="front-body">
          <div>
            <div class="card-tag" id="ftag">Kapitel</div>
            <div class="card-q" id="fq">Lade...</div>
          </div>
          <div class="card-hint">☝️ Tippen zum Aufdecken</div>
        </div>
      </div>
      <div class="card-face card-back">
        <div class="back-body" id="back-body"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="markNo()">✕ Nochmal</button>
    <button class="ctrl-btn primary" id="yes-btn" onclick="markYes()">✓ Gewusst!</button>
  </div>
</div>

<script>
const TC={
  mg:'background:var(--green-bg);color:var(--green)',
  mo:'background:var(--green-bg);color:var(--green)',
  ms:'background:var(--purple-bg);color:var(--purple)',
  mp:'background:var(--amber-bg);color:var(--amber)',
  mr:'background:var(--coral-bg);color:var(--red-t)',
  bpmn:'background:var(--purple-bg);color:var(--purple)',
  erm:'background:var(--blue-bg);color:var(--blue)',
  aris:'background:var(--amber-bg);color:var(--amber)',
  pps:'background:var(--coral-bg);color:var(--coral)',
  bev:'background:var(--green-bg);color:var(--green)',
  ps:'background:var(--coral-bg);color:var(--coral)',
  mrp:'background:var(--green-bg);color:var(--green)',
  fst:'background:var(--coral-bg);color:var(--red-t)',
  tech:'background:var(--green-bg);color:var(--green-mid)',
  pruf:'background:var(--purple-bg);color:var(--purple)',
};
const PC={
  mg:'#1D9E75',mo:'#0F6E56',ms:'#7F77DD',mp:'#BA7517',mr:'#993C1D',
  bpmn:'#534AB7',erm:'#185FA5',aris:'#854F0B',pps:'#D85A30',bev:'#3B6D11',
  ps:'#D85A30',mrp:'#3B6D11',fst:'#993556',tech:'#0F6E56',pruf:'#534AB7',
};

function mk(ch,tg,tl,q,def,ans,ex){
  return{ch,tg,tl,q,def,ans,ex};
}

const C=[
mk('MM: Grundlagen','mg','MM: Grundlagen','Was sind die 3 Aufgaben des Einkaufs & der Beschaffung?','<strong>Einkauf & Beschaffung</strong> = SAP-Bereich für den Kauf von Materialien/Dienstleistungen. Integriert mit FI, PP, SD, WM.',`<div class="br2"><span class="bg2" style="background:var(--green-bg);color:var(--green)">Einkaufsabwicklung</span><span class="bg2" style="background:var(--purple-bg);color:var(--purple)">Warenbewegung</span><span class="bg2" style="background:var(--amber-bg);color:var(--amber)">Warenbewertung</span></div>`,'🚲 Aluminium kaufen (Einkaufsabwicklung) → Wareneingang buchen → Bestand in Euro bewerten.'),
mk('MM: Grundlagen','mg','MM: Grundlagen','Was ist der Unterschied zwischen Primär-, Sekundär- und Tertiärbedarf?','<strong>Bedarf</strong> = benötigte Menge eines Materials in einer Periode. Drei Ebenen von Endprodukten bis Hilfsmitteln.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">1</div><div><strong>Primärbedarf</strong> – Endprodukte zum Verkauf</div></div><div class="fs2"><div class="fn" style="background:var(--purple-bg);color:var(--purple)">2</div><div><strong>Sekundärbedarf</strong> – Rohstoffe & Halbfabrikate (Stückliste)</div></div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">3</div><div><strong>Tertiärbedarf</strong> – Hilfs- & Betriebsmittel</div></div></div>`,'🚲 1.000 Fahrräder (Primär) → 2.000 Räder (Sekundär) → Montagefett (Tertiär).'),
mk('MM: Grundlagen','mg','MM: Grundlagen','Plangesteuerte vs. verbrauchsgesteuerte Disposition?','<strong>Disposition</strong> = Planung wann und wie viel bestellt/produziert wird.',`<table class="tb"><tr><th></th><th>Plangesteuert</th><th>Verbrauchsgest.</th></tr><tr><td>Basis</td><td>Primärbedarf+Stückliste</td><td>Historische Werte</td></tr><tr><td>Einsatz</td><td><span class="h ha">A-Teile</span></td><td><span class="h hg">B-/C-Teile</span></td></tr></table>`,'🚲 Rahmen (teuer) → plangesteuert. Schrauben → Bestellpunkt: unter 1.000 → automatisch 5.000 bestellen.'),
mk('MM: Grundlagen','mg','MM: Grundlagen','Die 3 Methoden zur Materialverbrauchsermittlung?','<strong>Materialverbrauch</strong> = tatsächlich eingesetzte Menge in einem Zeitraum.',`<table class="tb"><tr><th>Methode</th><th>Formel</th><th>Besonderheit</th></tr><tr><td><strong>Inventur</strong></td><td>Anfang+Zugänge−Ende</td><td>Berücksichtigt Schwund</td></tr><tr><td><strong>Retrograd</strong></td><td>Prod.×Soll</td><td>Keine Ist-Abweichung</td></tr><tr><td><strong>Skontration</strong></td><td>ΣEntnahmen</td><td>Sehr genau</td></tr></table>`,'🚲 Retrograd: 1.000×2=2.000. Skontration: 900+550+600=2.050. Inventur: 400+2.000−300=2.100.'),
mk('MM: Organisation','mo','MM: Organisation','Mandant vs. Buchungskreis?','<strong>Mandant</strong>=Konzern (höchste Ebene). <strong>Buchungskreis</strong>=kleinste buchhalterische Einheit mit eigener Bilanz & GuV.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">M</div><div>Mandant = Konzern, höchste Ebene</div></div><div class="fa">↓ enthält mehrere</div><div class="fs2"><div class="fn" style="background:var(--purple-bg);color:var(--purple)">B</div><div>Buchungskreis = eigene Bilanz & GuV</div></div></div>`,'🚲 Global Bike Konzern = Mandant. DE00 (Germany GmbH) + US00 (Inc.) = zwei Buchungskreise.'),
mk('MM: Organisation','mo','MM: Organisation','Was ist ein Werk? Welche 4 Aufgaben kann es haben?','<strong>Werk</strong>=Betriebsstätte in SAP, genau einem Buchungskreis zugeordnet.',`<div class="br2"><span class="bg2" style="background:var(--green-bg);color:var(--green)">Beschaffung</span><span class="bg2" style="background:var(--purple-bg);color:var(--purple)">Fertigung</span><span class="bg2" style="background:var(--amber-bg);color:var(--amber)">Distribution</span><span class="bg2" style="background:var(--coral-bg);color:var(--coral)">Instandhaltung</span></div><div style="margin-top:.4rem">Lagerort = feinste Ebene (RM00, FG00)</div>`,'🚲 Werk HD00 → BuKr DE00. Lagerort RM00 (Rohstoffe) + FG00 (Fertigwaren).'),
mk('MM: Organisation','mo','MM: Organisation','Einkaufsorganisation vs. Einkäufergruppe?','<strong>Einkaufsorganisation</strong>=verhandelt Konditionen. <strong>Einkäufergruppe</strong>=zuständige Einkäufer.',`<table class="tb"><tr><th>Einheit</th><th>Aufgabe</th><th>Charakter</th></tr><tr><td><strong>Einkaufsorg.</strong></td><td>Konditionen verhandeln</td><td><span class="h hg">strukturell</span></td></tr><tr><td><strong>Einkäufergruppe</strong></td><td>Zuständige Mitarbeiter</td><td><span class="h hp">personell</span></td></tr></table>`,'🚲 EKO DE00 = Einkaufsorg. Deutschland. Gruppe E00 = Europateam für Rahmen & Räder.'),
mk('MM: Organisation','mo','MM: Organisation','Was ist ein Kontenplan?','<strong>Kontenplan</strong>=Liste aller Hauptbuchkonten. Rahmen für alle Buchungen im Buchungskreis.','Standards: <span class="h hp">GKR</span> + <span class="h ha">IKR</span>. Nutzbar von mehreren Buchungskreisen gemeinsam.','🚲 Konto 3000=Vorräte, 4000=Verbindlichkeiten – gleiche Nummern für DE00 und US00 → Konzernauswertung.'),
mk('MM: Stammdaten','ms','MM: Stammdaten','Was ist ein Einkaufsinfosatz?','<strong>Einkaufsinfosatz</strong>=Verbindung Material↔Lieferant. Schwächste Bezugsquelle: zeigt nur dass ein Lieferant liefern kann.',`<div class="br2"><span class="bg2" style="background:var(--purple-bg);color:var(--purple)">Mengeneinheiten</span><span class="bg2" style="background:var(--purple-bg);color:var(--purple)">Toleranzgrenzen</span><span class="bg2" style="background:var(--purple-bg);color:var(--purple)">Einkaufskonditionen</span></div><div style="margin-top:.4rem">⚠️ Kein Vertrag, keine Freigabe!</div>`,'🚲 "Köln Bike Supplies kann Rahmen liefern, 45€, ±10%." – Nur Information, noch kein Auftrag.'),
mk('MM: Stammdaten','ms','MM: Stammdaten','Infosatz vs. Orderbuch?','<strong>Orderbuch</strong>=offizielle Positivliste freigegebener Lieferanten für ein Material.',`<table class="tb"><tr><th></th><th>Infosatz</th><th>Orderbuch</th></tr><tr><td>Aussage</td><td>Kann liefern</td><td><span class="h hg">Ist freigegeben</span></td></tr><tr><td>Bindung</td><td>Keine</td><td>Genehmigung</td></tr></table>`,'🚲 Qualitätsprüfung bestanden → ins Orderbuch. Nur genehmigte Lieferanten dürfen Bestellungen bekommen.'),
mk('MM: Stammdaten','ms','MM: Stammdaten','Grundbuch, Hauptbuch, Nebenbuch?','<strong>FI</strong>=SAP-Modul für alle Buchungen. Drei Buchebenen mit unterschiedlichem Detailgrad.',`<table class="tb"><tr><th>Buch</th><th>Inhalt</th><th>SAP</th></tr><tr><td><strong>Grundbuch</strong></td><td>Zeitlich geordnet</td><td>Universal Journal</td></tr><tr><td><strong>Hauptbuch</strong></td><td>Sachlich → Bilanz</td><td>General Ledger</td></tr><tr><td><strong>Nebenbuch</strong></td><td>Details je Partner</td><td>Material Ledger</td></tr></table><span class="h hp">Debitoren</span>=Kunden | <span class="h hg">Kreditoren</span>=Lieferanten`,'🚲 Hauptbuch: Forderungen 200.000€. Nebenbuch: Kunde A=500€, B=1.200€ – jede Rechnung verfolgbar.'),
mk('MM: Stammdaten','ms','MM: Stammdaten','Sachkonten & Abstimmkonten?','<strong>Sachkonto</strong>=Konto in Bilanz/GuV. <strong>Abstimmkonto</strong>=synchronisiert Neben- und Hauptbuch automatisch.',`<table class="tb"><tr><th>Art</th><th>In</th></tr><tr><td><strong>Bestandskonto</strong></td><td>Bilanz</td></tr><tr><td><strong>Erfolgskonto</strong></td><td>GuV</td></tr><tr><td><strong>Abstimmkonto</strong></td><td>Hauptbuch auto.</td></tr></table>⚠️ <span class="h hr">Nicht direkt buchbar</span>!`,'🚲 Lieferantenrechnung im Nebenbuch → SAP überträgt sofort auf "Verbindlichkeiten LuL" im Hauptbuch.'),
mk('MM: Stammdaten','ms','MM: Stammdaten','Preissteuerung S vs. V?','<strong>Preissteuerung</strong>=legt fest wie der Materialwert im Lager berechnet wird.',`<table class="tb"><tr><th>Kürzel</th><th>Name</th><th>Verhalten</th></tr><tr><td><strong>S</strong></td><td>Standardpreis</td><td>Fix pro Periode</td></tr><tr><td><strong>V</strong></td><td>Gleit. Durchschnitt</td><td>Neuberechnung bei WE</td></tr></table>`,'🚲 1.000 Helme à $35 + 1.000 à $30 → GLD=($35.000+$30.000)/2.000=<strong>$32,50</strong>.'),
mk('MM: Stammdaten','ms','MM: Stammdaten','Geschäftspartner Lieferant – 2 Rollen?','<strong>Geschäftspartner</strong>=SAP-Objekt für externe Partner. Lieferant hat zwei kombinierte Rollen.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--purple-bg);color:var(--purple)">F</div><div><strong>FLVN00 – Kreditor</strong>: IBAN, Zahlungsbedingungen</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">M</div><div><strong>FLVN01 – Lieferant</strong>: Lieferbedingungen, Einkaufsorg.</div></div></div>`,'🚲 "Cologne Bike Supplies": Kreditor=IBAN für Zahlung. Lieferant=14 Tage Lieferzeit. Beide Rollen = vollständig.'),
mk('MM: Prozesse','mp','MM: Prozesse','Procure-to-Pay (P2P) in der richtigen Reihenfolge?','<strong>P2P</strong>=vollständiger Einkaufsprozess vom Bedarf bis zur Zahlung. Kernprozess MM+FI.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">1</div><div>BAnf – intern, kein Lieferantenkontakt</div></div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">2</div><div>Bezugsquellenermittlung</div></div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">3</div><div>Bestellung → Lieferant</div></div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">4</div><div>Wareneingang → erster FI-Beleg!</div></div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">5</div><div>Rechnungsprüfung → Zahlung</div></div></div>`,'🚲 500 Reifen fehlen (BAnf) → Lieferant → Bestellung → WE+FI → Rechnung prüfen → zahlen.'),
mk('MM: Prozesse','mp','MM: Prozesse','Bezugsquellenermittlung: Reihenfolge & wann automatisch?','<strong>Bezugsquellenermittlung</strong>=SAP sucht besten Lieferanten nach BAnf. Prioritätsreihenfolge.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">1</div><div>Quotierung</div></div><div class="fa">↓ nicht gefunden</div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">2</div><div>Orderbuch</div></div><div class="fa">↓</div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">3</div><div>Rahmenvertrag</div></div><div class="fa">↓</div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">4</div><div>Einkaufsinfosatz</div></div><div class="fa">↓ nichts</div><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--red-t)">!</div><div>Ausschreibung</div></div></div>Automatisch nur wenn <span class="h ha">eindeutig</span>!`,'🚲 Bremsscheiben: Quotierung? Nein. Orderbuch? Nein. Rahmenvertrag Shimano? Ja → automatisch.'),
mk('MM: Prozesse','mp','MM: Prozesse','Was ist eine Quotierung?','<strong>Quotierung</strong>=prozentuale Verteilung des Bedarfs auf mehrere Lieferanten. Risikostreuung.','60% → Lieferant A | 40% → Lieferant B. Gründe: Kapazität nicht allein deckbar | Ausfallschutz.','🚲 1.000 Knieschoner/Monat: Shell Gear 60%=600, Burgmeister 40%=400. Fällt einer aus, läuft Produktion weiter.'),
mk('MM: Prozesse','mp','MM: Prozesse','Was sind Rahmenverträge? Alle Arten?','<strong>Rahmenvertrag</strong>=langfristige Lieferantenvereinbarung. Einmal verhandeln → viele Male abrufen.',`<table class="tb"><tr><th>Art</th><th>Limit</th><th>Datum</th></tr><tr><td><strong>Mengenkontrakt</strong></td><td>Stückzahl</td><td>Flexibel</td></tr><tr><td><strong>Wertkontrakt</strong></td><td>Euro-Betrag</td><td>Flexibel</td></tr><tr><td><strong>Lieferplan</strong></td><td>Menge+Termin</td><td>Fest</td></tr></table>`,'🚲 Mengenkontrakt: "10.000 Reifen 2026." Lieferplan: "Jeden Montag 200." Wertkontrakt: "Bis 100.000€."'),
mk('MM: Prozesse','mp','MM: Prozesse','BAnf vs. Bestellung – Kopf- und Positionsdaten?','<strong>BAnf</strong>=interner Beleg. <strong>Bestellung</strong>=rechtlich bindend, geht an Lieferant.',`<table class="tb"><tr><th>Ebene</th><th>Enthält</th></tr><tr><td>Kopfdaten</td><td>Bestellnr., Lieferant, Zahlungsbedingungen</td></tr><tr><td>Positionsdaten</td><td>Material, Menge, Preis, Positionstyp</td></tr></table>BAnf geht <span class="h hr">nicht an</span> Lieferant!`,'🚲 Bestellung 4500000003: Kopf=Shimano, 30 Tage netto. Position 10=100 Bremsscheiben à 8€.'),
mk('MM: Prozesse','mp','MM: Prozesse','Ausschreibungsprozess – wann & wie?','<strong>Ausschreibung</strong>=neue Lieferanten finden wenn keine Bezugsquelle bekannt.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">1</div><div>Ausschreibung anlegen</div></div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">2</div><div>Lieferantenanfragen senden</div></div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">3</div><div>Angebote vergleichen (Nettowert)</div></div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">4</div><div>Zuschlag → Bestellung oder Kontrakt</div></div></div>`,'🚲 Neues Carbon-Material: 5 Anfragen, 3 Angebote, günstigster bekommt Zuschlag → direkt Bestellung.'),
mk('MM: Prozesse','mp','MM: Prozesse','EDI – was ist das? Vor- & Nachteile?','<strong>EDI</strong>=automatischer digitaler Datenaustausch zwischen Unternehmen. Standard: EDIFACT.',`<table class="tb"><tr><th>✅ Vorteile</th><th>❌ Nachteile</th></tr><tr><td>Weniger manuelle Arbeit</td><td>Hohe Investitionskosten</td></tr><tr><td>Keine Doppeleingabe</td><td>Sensible Daten geteilt</td></tr><tr><td>Weniger Verwaltung</td><td>Expertise nötig</td></tr></table>`,'🚲 Bestand unter 200 Bremsscheiben → SAP sendet automatisch Bestellung an Shimano. Kein Mensch tippt etwas.'),
mk('MM: Prozesse','mp','MM: Prozesse','4 Warenbewegungsarten & wann FI-Beleg?','<strong>Warenbewegung</strong>=Bestandsveränderung. Dreistellige Bewegungsart steuert den Vorgang.',`<table class="tb"><tr><th>Nr.</th><th>Art</th><th>FI?</th></tr><tr><td><strong>1</strong></td><td>Wareneingang</td><td><span class="h hg">Ja</span></td></tr><tr><td><strong>2</strong></td><td>Warenausgang</td><td><span class="h hg">Ja</span></td></tr><tr><td><strong>3</strong></td><td>Umlagerung</td><td>Kommt drauf an</td></tr><tr><td><strong>4</strong></td><td>Umbuchung</td><td><span class="h hr">Nein</span></td></tr></table>Versch. BuKr → MM+<span class="h ha">2×FI</span>`,'🚲 WE Reifen → Bestand↑+FI. Qualitätsprüf→frei = Umbuchung, kein FI. Heidelberg→Hamburg = MM+FI.'),
mk('MM: Prozesse','mp','MM: Prozesse','Was sind Bestandsarten?','<strong>Bestandsart</strong>=Status einer Ware im Lager. Legt fest ob sie verwendet werden darf.',`<span class="h hg">✅ Frei verfügbar</span> – sofort nutzbar<br><span class="h ha">🔍 Qualitätsprüfbestand</span> – erst prüfen<br><span class="h hr">🚫 Gesperrt</span> – nicht verfügbar<br>Sonder: <span class="h hp">Kundenauftragsbestand</span> | <span class="h ha">Konsignation</span>`,'🚲 500 Helme an → Qualitätsprüfbestand. Bestanden → frei. 20 beschädigt → gesperrt → zurück.'),
mk('MM: Rechnungswesen','mr','MM: Rechnungswesen','T-Konto-Buchungen: WE → RE → Zahlung?','<strong>WE/RE-Konto</strong>=Zwischenkonto zwischen Warenlieferung und Rechnungseingang.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">1</div><div>WE: Bestand↑ / WE-RE↑</div></div><div class="fa">↓</div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">2</div><div>RE: WE-RE↓ / Verbindlichkeit↑</div></div><div class="fa">↓</div><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--red-t)">3</div><div>Zahlung: Verbindlichkeit↓ / Bank↓</div></div></div>FI erst ab <span class="h hg">Wareneingang</span>!`,'🚲 1.000 Reifen à 5€ (1.3.): Lager+5k, WE/RE+5k. RE(5.3.): WE/RE−5k, Verbindl.+5k. Zahlung(10.3.): Bank−5k.'),
mk('MM: Rechnungswesen','mr','MM: Rechnungswesen','Beleg in Buchführung vs. in SAP?','<strong>Beleg</strong>=Nachweisdokument. Buchführung: nur buchungsrelevant. SAP: jede Aktivität erzeugt Beleg.',`<table class="tb"><tr><th></th><th>Buchführung</th><th>SAP</th></tr><tr><td>Umfang</td><td>Nur buchhalterisch</td><td>Jede Aktivität</td></tr><tr><td>Beispiel</td><td>Rechnung</td><td>BAnf, Bestellung, WE…</td></tr></table>`,'🚲 BAnf = SAP-Beleg (kein FI). Bestellung = SAP-Beleg (kein FI). WE = Beleg (MM+FI). Rechnung = Beleg (FI).'),
mk('BPMN','bpmn','BPMN','Was ist BPMN? Die 4 Grundelemente?','<strong>BPMN</strong>=Standard zur grafischen Darstellung von Geschäftsprozessen. Fluss links→rechts.',`<table class="tb"><tr><th>Symbol</th><th>Name</th><th>Bedeutung</th></tr><tr><td>⭕ dünner Kreis</td><td>Startereignis</td><td>Prozess beginnt</td></tr><tr><td>▭ Rechteck abger.</td><td>Aktivität</td><td>Schritt ausführen</td></tr><tr><td>◇ Raute</td><td>Gateway</td><td>Entscheidung</td></tr><tr><td>⬤ dicker Kreis</td><td>Endereignis</td><td>Prozess endet</td></tr></table>`,'🚲 ⭕ Bedarf → ▭ BAnf erstellen → ◇ Bezugsquelle bekannt? → Ja: ▭ Bestellung → ⬤ fertig.'),
mk('BPMN','bpmn','BPMN','XOR-, AND-, OR-Gateway?','<strong>Gateway</strong>=Entscheidungspunkt. Split=teilt auf. Join=führt zusammen.',`<table class="tb"><tr><th>Symbol</th><th>Typ</th><th>Regel</th></tr><tr><td><strong>✕</strong></td><td>XOR</td><td>Genau 1 Pfad</td></tr><tr><td><strong>+</strong></td><td>AND</td><td>Alle Pfade gleichzeitig</td></tr><tr><td><strong>○</strong></td><td>OR</td><td>Mindestens 1 Pfad</td></tr></table>`,'🚲 XOR: Überweisung ODER Kreditkarte. AND: Rechnung UND Ware gleichzeitig. OR: Mail ODER/UND Anruf.'),
mk('BPMN','bpmn','BPMN','BPMN-Artefakte?','<strong>Artefakte</strong>=zusätzliche Elemente zur Detaillierung. Beeinflussen Kontrollfluss nicht direkt.',`<table class="tb"><tr><th>Element</th><th>Symbol</th><th>Bedeutung</th></tr><tr><td>Datenobjekt</td><td>Dokumenten-Icon</td><td>Informationen</td></tr><tr><td>Daten-Assoziation</td><td>Gepunkteter Pfeil</td><td>Lesen oder Schreiben</td></tr><tr><td>Anmerkung</td><td>[Text]+Linie</td><td>Erläuterung</td></tr></table>`,'🚲 "Rechnung prüfen" liest Datenobjekt "Lieferantenrechnung". Schreibt "Freigabestatus". Anmerkung: "Frist 14 Tage".'),
mk('BPMN','bpmn','BPMN','Prozess vs. Geschäftsprozess?','<strong>Prozess</strong>=allgemeine Aktivitätsabfolge. <strong>Geschäftsprozess</strong>=Prozess im betriebswirtschaftlichen Kontext.',`<table class="tb"><tr><th></th><th>Prozess</th><th>Geschäftsprozess</th></tr><tr><td>Kontext</td><td>Allgemein</td><td>Betriebswirtschaftlich</td></tr><tr><td>Auslöser</td><td>Startereignis</td><td>Betriebliches Objekt</td></tr></table>`,'🚲 "Paket verpacken" = Prozess. "Kundenauftrag abwickeln" = Geschäftsprozess (Lager, Rechnung, Zahlung).'),
mk('ERM','erm','ERM','Was ist ein ERM? Entitätstyp, Attribut, Beziehung?','<strong>ERM</strong>=Datenmodellierungsmethode. Zeigt welche Daten existieren und wie sie zusammenhängen. Von Chen 1976.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--purple-bg);color:var(--purple)">E</div><div>Entitätstyp (Rechteck) = Objekt</div></div><div class="fs2"><div class="fn" style="background:var(--purple-bg);color:var(--purple)">A</div><div>Attribut (Kreis) = Eigenschaft, <u>Schlüssel</u> unterstrichen</div></div><div class="fs2"><div class="fn" style="background:var(--purple-bg);color:var(--purple)">R</div><div>Beziehung (Raute) = Verbindung</div></div></div>`,'🚲 "Lieferant" (Lieferantennr., Name) – "liefert" – "Material" (Materialnr., Preis). 1 Lieferant → viele Materialien.'),
mk('ERM','erm','ERM','Kardinalitäten 1:1, 1:n, m:n?','<strong>Kardinalität</strong>=Anzahl möglicher Beziehungen zwischen Entitätsinstanzen.',`<table class="tb"><tr><th>Typ</th><th>Bedeutung</th><th>Beispiel</th></tr><tr><td><strong>1:1</strong></td><td>Eine zu einer</td><td>Student–Ausweis</td></tr><tr><td><strong>1:n</strong></td><td>Eine zu vielen</td><td>Hochschule–Studenten</td></tr><tr><td><strong>m:n</strong></td><td>Viele zu vielen</td><td>Studenten–Vorlesungen</td></tr></table>`,'🚲 Bestellung–Material: m:n → Zwischentabelle nötig! (1 Bestellung hat viele Materialien, 1 Material in vielen Bestellungen.)'),
mk('ERM','erm','ERM','Generalisierung vs. Spezialisierung?','<strong>Generalisierung</strong>=zusammenfassen (↑). <strong>Spezialisierung</strong>=zerlegen (↓). Verbunden durch Is-A. Attribute werden vererbt.',`<table class="tb"><tr><th></th><th>Generalisierung</th><th>Spezialisierung</th></tr><tr><td>Richtung</td><td>↑ zusammenfassen</td><td>↓ zerlegen</td></tr><tr><td>Beispiel</td><td>Kunde+Lieferant→Geschäftspartner</td><td>Arbeitsplan→Fertigungs-/Montageplan</td></tr></table>`,'🚲 Geschäftspartner hat "Adresse". Spezialisierung: Lieferant (+Lieferzeit), Kunde (+Kreditlimit). Beide erben "Adresse".'),
mk('ERM','erm','ERM','Aggregation vs. Assoziation?','<strong>Aggregation</strong>=part-of (Ganzes aus Teilen). <strong>Assoziation</strong>=neues Objekt aus Entitätskombination.',`<table class="tb"><tr><th></th><th>Aggregation</th><th>Assoziation</th></tr><tr><td>Prinzip</td><td>Ganzes=Summe Teile</td><td>Neue Entität aus Kombination</td></tr><tr><td>Symbol</td><td>part-of</td><td>Umrandete Raute</td></tr></table>`,'🚲 Aggregation: Fahrrad part-of Rahmen, Räder. Assoziation: Kunde+Zeit → Auftragskopf (KNR+Datum als Schlüssel).'),
mk('ARIS','aris','ARIS','Was ist ARIS? 4 Sichten?','<strong>ARIS</strong>=Framework zur vollständigen Unternehmens- und IT-Beschreibung aus 4 Blickwinkeln.',`<div class="br2"><span class="bg2" style="background:var(--purple-bg);color:var(--purple)">Organisation</span><span class="bg2" style="background:var(--green-bg);color:var(--green)">Daten</span><span class="bg2" style="background:var(--amber-bg);color:var(--amber)">Funktion</span><span class="bg2" style="background:var(--coral-bg);color:var(--coral)">Steuerung</span></div><div style="margin-top:.4rem">Je 3 Ebenen: <span class="h ha">Fachkonzept</span>→<span class="h hp">DV-Konzept</span>→<span class="h hg">Implementierung</span></div>`,'🚲 Wer macht was? (Org.) → Welche Daten? (Daten) → Welche Schritte? (Funktion) → Alles zusammen? (Steuerung).'),
mk('ARIS','aris','ARIS','3 Elemente der ARIS-Organisationssicht?','<strong>Organisationssicht</strong>=beschreibt Unternehmensaufbau: wer, wo, welche Rolle.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">OE</div><div>Organisationseinheit (Ellipse+Strich) = Abteilung</div></div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">PS</div><div>Planstelle (Rechteck+Strich) = Position</div></div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">P</div><div>Person (Rechteck ohne Strich) = Mitarbeiter</div></div></div>`,'🚲 OE: Abteilung Einkauf. PS: Planstelle Einkäufer (3 Stellen, 2 besetzt). P: Max Müller, Anna Klose.'),
mk('ARIS','aris','ARIS','Modellierungssicht: Geschäftsobjekte, -daten, -prozesse?','<strong>Modellierungssicht</strong>=ERP-Innenarchitektur. OO-Klassen arbeiten auf Daten und bilden Prozesse.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">1</div><div>Geschäftsobjekte = OO-Klassen mit Methoden</div></div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">2</div><div>Geschäftsdaten = persistent in DB-Tabellen</div></div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">3</div><div>Geschäftsprozess = Methodenaufruf-Kette</div></div></div>`,'🚲 Klasse "Bestellung".anlegen()→Klasse "Wareneingang".buchen() = Prozess.'),
mk('ARIS','aris','ARIS','Was ist ein Funktionsbaum?','<strong>Funktionsbaum</strong>=hierarchische Zerlegung einer Gesamtfunktion in Teilfunktionen.','Gesamtfunktion oben → Teilfunktionen darunter → immer detaillierter. Funktion = Eingabe→Ausgabe.','🚲 "Kapazitätsplanung" → Grunddaten / Zeitplanung / Kapazitätsabgleich → Zeitplanung: Vorwärts-/Rückwärtsterminierung.'),
mk('PPS: Grundlagen','pps','PPS: Grundlagen','Die 5 Fertigungsprinzipien?','<strong>Fertigungsprinzip</strong>=räumliche Anordnung von Mensch, Maschine und Material in der Produktion.',`<table class="tb"><tr><th>Prinzip</th><th>Idee</th><th>Beispiel</th></tr><tr><td>Werkbank</td><td>Ein Platz</td><td>Handwerk</td></tr><tr><td>Baustelle</td><td>Material kommt hin</td><td>Schiffbau</td></tr><tr><td>Werkstatt</td><td>Gleiche Maschinen</td><td>Dreherei</td></tr><tr><td>Insel</td><td>Stationsgruppe</td><td>Montageinsel</td></tr><tr><td>Linie</td><td>Hintereinander</td><td>Fließband</td></tr></table>`,'🚲 Fahrradmontage = Linie: Rahmen→Räder→Bremsen→Lenker→Sattel→Verpacken.'),
mk('PPS: Grundlagen','pps','PPS: Grundlagen','Die 3 Planungshorizonte?','<strong>Planungshorizont</strong>=Zeitraum einer Planung. Je kürzer, desto detaillierter.',`<table class="tb"><tr><th>Ebene</th><th>Horizont</th><th>Beispiel</th></tr><tr><td>Strategisch</td><td>1–10 Jahre</td><td>Absatzplanung</td></tr><tr><td>Taktisch</td><td>3M–3 Jahre</td><td>Personalplanung</td></tr><tr><td>Operativ</td><td>Tage–3M</td><td>Fertigungsplanung</td></tr></table>`,'🚲 Strategisch: 50.000 Fahrräder 2026. Taktisch: Q2 Personal aufstocken. Operativ: Diese Woche 200 fertigstellen.'),
mk('PPS: Grundlagen','pps','PPS: Grundlagen','4 Verfahren der Produktionssteuerung?','<strong>Produktionssteuerung</strong>=steuert Ausführung von Fertigungsaufträgen. Ziel: richtige Menge, richtiger Termin.',`<table class="tb"><tr><th>Verfahren</th><th>Prinzip</th></tr><tr><td><strong>OPT</strong></td><td>Engpass steuert alles</td></tr><tr><td><strong>BOA</strong></td><td>Belastungs- + Dringlichkeitsprüfung</td></tr><tr><td><strong>KANBAN</strong></td><td>Pull: leere Kiste → Nachproduktion</td></tr><tr><td><strong>Fortschrittszahlen</strong></td><td>Kumulat. Mengenzählung</td></tr></table>`,'🚲 KANBAN: Kiste mit 50 Bremsscheiben leer → Karte anhängen → 50 neue produzieren.'),
mk('PPS: Grundlagen','pps','PPS: Grundlagen','Was ist Kapazitätsabgleich?','<strong>Kapazitätsabgleich</strong>=Vergleich Kapazitätsbedarf (Aufträge) vs. Kapazitätsangebot (Maschinen/Personal).',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--coral)">1</div><div>Belastungsterminierung – ohne Kapazitätsgrenzen → zeigt Über-/Unterlast</div></div><div class="fa">↓</div><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--coral)">2</div><div>Kapazitätsterminierung – mit verfügbarer Kapazität</div></div><div class="fa">↓</div><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--coral)">3</div><div>Reihenfolgeplanung – bei vielen Restriktionen</div></div></div>`,'🚲 12 Aufträge alle auf Montag → Überlast! Kapazitätsterminierung: max. 8h/3 Mitarbeiter. Eilaufträge zuerst.'),
mk('PPS: Grundlagen','pps','PPS: Grundlagen','Was ist PPS?','<strong>PPS</strong>=Produktionsplanung und -steuerung. Bindeglied zwischen MM (Einkauf), PP (Produktion) und SD (Vertrieb).',`<div class="br2"><span class="bg2" style="background:var(--coral-bg);color:var(--coral)">Programmplanung</span><span class="bg2" style="background:var(--purple-bg);color:var(--purple)">Sekundärbedarf</span><span class="bg2" style="background:var(--green-bg);color:var(--green)">Fremdbezug</span><span class="bg2" style="background:var(--amber-bg);color:var(--amber)">Eigenfertigung</span><span class="bg2" style="background:var(--coral-bg);color:var(--coral)">Steuerung</span></div>`,'🚲 200 Fahrräder planen → 400 Räder bestellen → Rahmen selbst produzieren → Aufträge überwachen.'),
mk('PPS: Bevorratung','bev','PPS: Bevorratung','4 Bevorratungsstrategien & Entkopplungspunkt?','<strong>Bevorratungsstrategie</strong>=legt fest ab welchem Punkt in der Supply Chain kundenbezogen gearbeitet wird.',`<table class="tb"><tr><th>Strategie</th><th>Was ist auftragsbezogen?</th></tr><tr><td><strong>MTS</strong></td><td>Nichts – alles auf Lager</td></tr><tr><td><strong>ATO</strong></td><td>Nur Montage</td></tr><tr><td><strong>MTO</strong></td><td>Fertigung + Montage</td></tr><tr><td><strong>ETO</strong></td><td>Alles inkl. Konstruktion</td></tr></table>`,'🚲 MTS: Helm fertig im Regal. ATO: Rahmen auf Lager, Farbe nach Bestellung. MTO: Alles auf Bestellung. ETO: Sonder-Rennrad komplett nach Kundenwunsch.'),
mk('PPS: Stammdaten','ps','PPS: Stammdaten','Stückliste – 3 Formen?','<strong>Stückliste</strong>=Verzeichnis aller Komponenten für ein Produkt. Basis für Planung, Einkauf, Fertigung.',`<table class="tb"><tr><th>Form</th><th>Prinzip</th></tr><tr><td>Strukturstückliste</td><td>Alle Ebenen in einer Liste</td></tr><tr><td>Baukastenstückliste</td><td>Jede Baugruppe eigene Liste</td></tr><tr><td>Variantenstückliste</td><td>Alle Varianten in einem Dok.</td></tr></table>SAP: immer <span class="h hc">einstufig</span>→mehrstufig durch Verknüpfung`,'🚲 Fahrrad: Stufe 0=Fahrrad. Stufe 1=Rahmen, Vorderrad, Hinterrad. Stufe 2=Vorderrad (Felge, Speichen, Reifen).'),
mk('PPS: Stammdaten','ps','PPS: Stammdaten','Arbeitsplan & Auftragszeit-Berechnung?','<strong>Arbeitsplan</strong>=beschreibt alle Produktionsschritte: was, wo, wie lange, womit.',`<div class="fm">Ta = tr + (m × te)</div><table class="tb"><tr><th>Kürzel</th><th>Bedeutung</th></tr><tr><td>tr</td><td>Rüstzeit</td></tr><tr><td>m</td><td>Stückzahl</td></tr><tr><td>te</td><td>Zeit je Einheit</td></tr></table>`,'🚲 Lackieren: Rüstzeit 10 Min, 2 Min/Stück, 50 Fahrräder → Ta = 10+(50×2)=110 Min.'),
mk('PPS: Stammdaten','ps','PPS: Stammdaten','Arbeitsplatz & verfügbare Kapazität?','<strong>Arbeitsplatz</strong>=Ort für Produktionsvorgänge. Kapazität = Einsatzzeit × Anzahl × Nutzungsgrad.',`<div class="fm">Kapazität = Einsatzzeit × Anz. × (NG/100)</div><div style="margin-top:.4rem">8h × 3 × 100% = <span class="h hg">24h verfügbar</span></div>`,'🚲 ASSY1000: 3 Mitarbeiter, 8h, 100% = 24h. Bei 80%: 3×8×0,8=19,2h effektiv.'),
mk('PPS: Stammdaten','ps','PPS: Stammdaten','Vorgangssplittung?','<strong>Splittung</strong>=Fertigungsauftrag in Teillose aufteilen, die parallel laufen → kürzere Durchlaufzeit.',`<div class="fm">Dauer = (m×te/Basis) / Splits</div><div style="margin-top:.4rem">Ohne: 200×(10/15)=<span class="h hr">133 Min</span><br>3 Splits: 133/3≈<span class="h hg">44,5 Min</span></div>⚠️ Max. Splits im <span class="h ha">Arbeitsplan</span>!`,'🚲 200 Fahrräder lackieren. 1 Maschine=133 Min. 3 parallele Maschinen=44,5 Min. 2/3 schneller!'),
mk('PPS: Stammdaten','ps','PPS: Stammdaten','Was ist eine Produktgruppe?','<strong>Produktgruppe</strong>=Zusammenfassung von Materialien/Produktgruppen für aggregierte Planung.',`Mitglieder = Materialien ODER andere Produktgruppen<br><span class="h hc">PG-BIKE000</span>→<span class="h hp">PG-TRBK000</span>→<span class="h hg">PG-DXTR000</span>`,'🚲 Plan: 500 Touring Bikes Q1. SAP verteilt: DXTR1000=200, DXTR2000=180, DXTR3000=120.'),
mk('PPS: MRP & Planung','mrp','PPS: MRP & Planung','Was ist SOP?','<strong>SOP</strong>=Absatz- & Produktionsgrobplanung. Verbindet Absatzerwartungen mit Produktionskapazität.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">1</div><div>Absatzgrobplanung – Mengen je Periode</div></div><div class="fa">↓</div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">2</div><div>Produktionsgrobplanung – Mengen, Lagerbestände, Reichweiten</div></div></div>Strategien: <span class="h hc">Absatzsynchron</span> <span class="h hg">Null-Lager</span> <span class="h hp">Ziellager</span> <span class="h ha">Zielreichweite</span>`,'🚲 Jan: Absatz 140, Anfangslager 250, Ziellager 100 → Produktion=max(140+100−250,0)=0. Lager reicht!'),
mk('PPS: MRP & Planung','mrp','PPS: MRP & Planung','Lagerbestand und Reichweite im Planungstableau?','<strong>Planungstableau</strong>=SAP-Ansicht für SOP mit Absatz, Produktion, Lagerbestand, Reichweite.',`<div class="fm">Lt = Lt-1 − At + Pt</div><div class="fm" style="margin-top:.3rem">Rt = max(Lt,0) / (At/Dt)</div>`,'🚲 L0=250, A1=140, P1=0, D1=28: L1=110. R1=(110/140)×28=22 AT. Lager reicht 22 Arbeitstage.'),
mk('PPS: MRP & Planung','mrp','PPS: MRP & Planung','Planungsstrategie Ziellagerbestand?','<strong>Ziellagerbestand</strong>=angestrebter Lagerbestand am Periodenende. SAP berechnet Produktionsmenge.',`<div class="fm">Pt = max(At + ZLt − Lt-1, 0)</div>`,'🚲 P2: max(186+90−110,0)=166. L2=110−186+166=90. Ziellagerbestand 90 erreicht!'),
mk('PPS: MRP & Planung','mrp','PPS: MRP & Planung','Die 4 Schritte der Materialbedarfsplanung (MRP)?','<strong>MRP</strong>=automatische Berechnung was, wann, wie viel beschafft/produziert werden muss.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">1</div><div>Nettobedarfsrechnung – Brutto−Lager=Unterdeckung</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">2</div><div>Beschaffungsmengenberechnung – Unterdeckung+Losgrößen</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">3</div><div>Terminierung – Eckstart & Eckende</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">4</div><div>Stücklistenauflösung → neue MRP-Runde</div></div></div>`,'🚲 200 nötig, 50 Lager → Nettobedarf 150 → Losgröße 200 → Eckende 30.3. → Räder+Rahmen bestellen!'),
mk('PPS: MRP & Planung','mrp','PPS: MRP & Planung','Planauftrag vs. Fertigungsauftrag?','<strong>Planauftrag</strong>=vorläufiger MRP-Vorschlag. <strong>Fertigungsauftrag</strong>=verbindlich nach Umwandlung.',`<table class="tb"><tr><th></th><th>Planauftrag</th><th>Fertigungsauftrag</th></tr><tr><td>Status</td><td>Planung – änderbar</td><td>Steuerung – verbindlich</td></tr><tr><td>MRP ändert?</td><td>Ja</td><td>Nein</td></tr><tr><td>Enthält</td><td>Menge+Termin</td><td>Stückliste+Arbeitsplan</td></tr></table>`,'🚲 MRP: Planauftrag "200 Fahrräder 30.3." Disponent prüft → Fertigungsauftrag: jetzt verbindlich, MRP ändert nicht mehr.'),
mk('PPS: MRP & Planung','mrp','PPS: MRP & Planung','Rückwärtsterminierung – 4 Termine?','<strong>Terminierung</strong>=SAP berechnet Start-/Endtermine. Rückwärts=vom Endtermin ausgehend.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--coral)">4</div><div>Eckendtermin – gewünschter Liefertermin</div></div><div class="fa">↓ −Sicherheitszeit</div><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--coral)">3</div><div>Terminiertes Ende</div></div><div class="fa">↓ −Produktionsdauer</div><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--coral)">2</div><div>Terminierter Start</div></div><div class="fa">↓ −Vorgriffszeit</div><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--coral)">1</div><div>Eckstarttermin</div></div></div>`,'🚲 Eckende 01.04. −1 Tag=30.03. −4 Tage=26.03. Start. −1 Tag=<strong>25.03. Eckstart</strong>.'),
mk('PPS: MRP & Planung','mrp','PPS: MRP & Planung','Was ist Leitteileplanung (MPS)?','<strong>Leitteile</strong>=hoher Wertschöpfungsanteil. <strong>MPS</strong>=spezielle Planung für maximale Verfügbarkeit.','Höhere Sicherheitsbestände akzeptiert um Verfügbarkeit sicherzustellen.<br>Global Bike: <span class="h hc">alle Fahrräder = Leitteile</span>','🚲 DXTR1000 = Leitteil: immer mind. 50 auf Lager. Großauftrag rein → sofort lieferbar.'),
mk('PPS: Fertigungssteuerung','fst','PPS: Fertigungssteuerung','Was passiert beim Anlegen eines Fertigungsauftrags?','<strong>Fertigungsauftrag</strong>=zentrales Bewegungsdatum in PP. Steuert Ausführung und sammelt Kosten.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--red-t)">1</div><div>Terminierung – alle Termine berechnet</div></div><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--red-t)">2</div><div>Verfügbarkeitsprüfung – Komponenten rechtzeitig da?</div></div><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--red-t)">3</div><div>Freigabe – Auftrag freigegeben</div></div></div>SAP kopiert <span class="h hg">Stückliste</span>+<span class="h hp">Arbeitsplan</span> → eingefroren`,'🚲 200 Fahrräder → FA. SAP: 400 Räder da? Rahmen da? Alles ok → freigegeben für 25.03.'),
mk('PPS: Fertigungssteuerung','fst','PPS: Fertigungssteuerung','4 Zeitkomponenten eines Fertigungsvorgangs?','<strong>Zeitkomponenten</strong>=Anteile der Gesamtdurchlaufzeit. Jeder hat andere Kostenwirkung.',`<table class="tb"><tr><th>Zeit</th><th>Bedeutung</th></tr><tr><td>Rüstzeit</td><td>Maschine vorbereiten</td></tr><tr><td>Bearbeitungszeit</td><td>Tatsächliche Fertigung</td></tr><tr><td>Abrüstdauer</td><td>Maschine zurückrüsten</td></tr><tr><td>Liegedauer</td><td>Warten zwischen Vorgängen</td></tr></table>`,'🚲 Lackieren: 15 Min rüsten + 100 Min bearbeiten + 10 Min abrüsten + 30 Min trocknen = 155 Min gesamt.'),
mk('PPS: Fertigungssteuerung','fst','PPS: Fertigungssteuerung','3 Schritte der Fertigungssteuerung?','<strong>Fertigungssteuerung</strong>=operative Ausführung von Fertigungsaufträgen. Von Entnahme bis Einlagerung.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--red-t)">1</div><div>Warenausgang – Rohstoffe entnehmen → MM+FI+Kostenbeleg</div></div><div class="fa">↓</div><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--red-t)">2</div><div>Rückmeldung – Fortschritt erfassen</div></div><div class="fa">↓</div><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--red-t)">3</div><div>Wareneingang – Fertigware ins Lager → MM+FI+Kostenbeleg</div></div></div>Abschluss: <span class="h ha">Auftragsabrechnung</span>`,'🚲 WA: 400 Räder entnehmen. Produktion. WE: 200 Fahrräder ins FG-Lager. Abrechnung: Kostenabweichung verbuchen.'),
mk('PPS: Fertigungssteuerung','fst','PPS: Fertigungssteuerung','Was ist die Auftragsabrechnung?','<strong>Auftragsabrechnung</strong>=letzter Schritt. Gleicht Ist-Kosten mit Standardpreis ab und verteilt Abweichungen.','Kosten auf FA: Rohstoffe (Ist) + Fertigware (Standardpreis)<br>Problem: Ist≠Standard → <span class="h ha">Restkosten offen</span><br>Lösung: Differenz an <span class="h hg">Kostenstellen</span>/<span class="h hp">Ergebnisrechnung</span>','🚲 Standardpreis 200€, Ist-Kosten 185€ → Differenz −15€×200=−3.000€ → an Kostenstelle Produktion.'),
mk('Technologie','tech','Technologie','Was ist die dreischichtige Client-Server-Architektur in SAP?','<strong>Client-Server-Architektur</strong>=Aufteilung in 3 logische Schichten. Ermöglicht Skalierbarkeit und Trennung der Zuständigkeiten.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">1</div><div><strong>Präsentationsschicht</strong> (SAP GUI) – zeigt UI, nimmt Eingaben entgegen</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">2</div><div><strong>Applikationsschicht</strong> – führt Programme & Geschäftslogik aus</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">3</div><div><strong>Datenbankschicht</strong> – speichert alle Daten dauerhaft</div></div></div>`,'🚲 Einkäufer am PC (Präsentation) tippt Bestellung → Applikationsserver verarbeitet → Datenbankserver speichert.'),
mk('Technologie','tech','Technologie','Was ist ein Dynpro? Wie funktioniert ein Dialog-Workprozess?','<strong>Dynpro (Dynamisches Programm)</strong>=SAP-Bildschirmmaske. <strong>Dialog-Workprozess</strong>=verarbeitet einen Dialogschritt auf dem Applikationsserver.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">1</div><div><strong>Dialog</strong> – Benutzer gibt Daten ein, löst Funktion aus</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">2</div><div><strong>Ablauflogik</strong> – auf Applikationsserver ausgeführt</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">3</div><div><strong>Verbuchung</strong> – Daten ohne Benutzerinteraktion gespeichert</div></div></div>Danach: Workprozess frei für nächsten Nutzer`,'🚲 Klick "Sichern" → Dynpro sendet Daten → Workprozess prüft → "Bestellung 37 angelegt" erscheint → frei.'),
mk('Technologie','tech','Technologie','Dialogfunktionen vs. Hintergrundfunktionen?','<strong>Dialogfunktion</strong>=Benutzer interagiert direkt. <strong>Hintergrundfunktion</strong>=läuft automatisch ohne Eingriff.',`<table class="tb"><tr><th></th><th>Dialog</th><th>Hintergrund</th></tr><tr><td>Interaktion</td><td>Benutzer aktiv</td><td>Kein Mensch</td></tr><tr><td>Ausführung</td><td>Sofort bei Aktion</td><td>Batch-Job, periodisch</td></tr><tr><td>Beispiel</td><td>Bestellung erfassen</td><td>Gehaltsabrechnung 23 Uhr</td></tr></table>SAP: <span class="h hp">Transaktion</span>=jede dialogorientierte Funktion`,'🚲 Dialog: Einkäufer erfasst Bestellung manuell. Hintergrund: Jeden Sonntag 23 Uhr läuft MRP automatisch.'),
mk('Technologie','tech','Technologie','Was sind alle Datenarten im ERP?','<strong>Geschäftsdaten</strong>=alle Daten eines ERP-Systems. Unterteilt nach Lebensdauer, Struktur und Zweck.',`<table class="tb"><tr><th>Art</th><th>Merkmal</th><th>Beispiel</th></tr><tr><td><strong>Stammdaten</strong></td><td>Lang relevant</td><td>Material, Lieferant</td></tr><tr><td><strong>Bewegungsdaten</strong></td><td>Tägliche Vorgänge</td><td>BAnf, Bestellung</td></tr><tr><td><strong>Bestandsdaten</strong></td><td>Akkumuliert</td><td>Materialbestand</td></tr><tr><td><strong>Zustandsdaten</strong></td><td>Aktueller Status</td><td>BAnf "freigegeben"</td></tr><tr><td><strong>Ereignisdaten</strong></td><td>Statusänderung</td><td>"Bestellung geändert"</td></tr></table>`,'🚲 Material DX350 = Stammdatum. BAnf für 200 Stück = Bewegungsdatum. 350 Stück Lager = Bestandsdatum.'),
mk('Technologie','tech','Technologie','Was ist die Automatisierungspyramide?','<strong>Automatisierungspyramide</strong>=hierarchisches Modell aller Ebenen der industriellen Automatisierung.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">4</div><div><strong>Unternehmensleitebene</strong> – ERP (Planung & Steuerung gesamt)</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">3</div><div><strong>Betriebsleitebene</strong> – MES (Fertigungssteuerung)</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">2</div><div><strong>Steuerungsebene</strong> – SPS, HMI (Maschinensteuerung)</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">1</div><div><strong>Feldebene</strong> – Aktoren und Sensoren</div></div></div>`,'🚲 ERP: Plant 200 Fahrräder. MES: Welche Maschine. SPS: Steuert Roboterarm. Sensor: "Schweißnaht fertig".'),
mk('Technologie','tech','Technologie','3 Integrationsarten in ERP?','<strong>Integration</strong>=Verknüpfung von Systemen, Funktionen und Prozessen damit Informationen nahtlos fließen.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">D</div><div><strong>Datenintegration</strong> – alle Anwendungen auf gemeinsame DB</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">F</div><div><strong>Funktionsintegration</strong> – Ergebnis Funktion → automatisch nächste</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">P</div><div><strong>Prozessintegration</strong> – Funktionen in Reihenfolge abgestimmt</div></div></div>`,'🚲 Daten: Einkauf+PP nutzen denselben Materialstamm. Funktion: WE → automatisch FI-Buchung.'),
mk('Technologie','tech','Technologie','Integrationstechniken?','<strong>Integrationstechnik</strong>=Methode wie verschiedene Softwaresysteme kommunizieren.',`<table class="tb"><tr><th>Technik</th><th>Prinzip</th></tr><tr><td><strong>Frontend</strong></td><td>Benutzeroberflächen kombiniert</td></tr><tr><td><strong>Anwendungslogik</strong></td><td>Methodenaufruf in anderem System</td></tr><tr><td><strong>Orchestrierung</strong></td><td>Zentraler Prozess steuert alle Systeme</td></tr><tr><td><strong>Choreographie</strong></td><td>Dezentrale Systeme kommunizieren selbst</td></tr></table>`,'🚲 Orchestrierung: SAP-Prozess ruft EDI-System, MES und FI nacheinander auf.'),
mk('Technologie','tech','Technologie','Was sind Geschäftsschnittstellen?','<strong>Geschäftsschnittstelle</strong>=technische Verbindung ERP↔andere Softwaresysteme.',`<div class="br2"><span class="bg2" style="background:var(--green-bg);color:var(--green)">CAD-System</span><span class="bg2" style="background:var(--purple-bg);color:var(--purple)">EDI</span><span class="bg2" style="background:var(--amber-bg);color:var(--amber)">MES</span><span class="bg2" style="background:var(--coral-bg);color:var(--coral)">CMS</span><span class="bg2" style="background:var(--blue-bg);color:var(--blue)">Zeiterfassung</span></div>`,'🚲 CAD erstellt Zeichnung → überträgt Stückliste ins ERP. Zeiterfassung meldet Stunden → ERP berechnet Lohn.'),
mk('Technologie','tech','Technologie','Standardsoftware vs. Individualsoftware? Anpassungsarten?','<strong>Standardsoftware</strong>=für viele Kunden. <strong>Individualsoftware</strong>=Maßanzug. ERP = immer Standardsoftware.',`<table class="tb"><tr><th>Anpassung</th><th>Methode</th><th>Aufwand</th></tr><tr><td><strong>Customizing</strong></td><td>Konfiguration via UI</td><td>Gering</td></tr><tr><td><strong>Personalisierung</strong></td><td>Benutzereinstellungen</td><td>Sehr gering</td></tr><tr><td><strong>Erweiterung</strong></td><td>Code an vorgesehenen Stellen</td><td>Mittel</td></tr><tr><td><strong>Modifikation</strong></td><td>Quellcode beliebig ändern</td><td>Hoch, riskant</td></tr></table>`,'🚲 Customizing: Buchungskreise einrichten. Erweiterung: eigene Berichte. Modifikation: Standard ändern (riskant!).'),
mk('Technologie','tech','Technologie','Was ist die Drei-Systeme-Landschaft?','<strong>Drei-Systeme-Landschaft</strong>=Aufteilung in Entwicklungs-, Test- und Produktivsystem. Schützt Tagesgeschäft vor Fehlern.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">1</div><div><strong>Entwicklungssystem</strong> – Programmierung (Entwickler)</div></div><div class="fa">↓ Export → Transport → Import</div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">2</div><div><strong>Testsystem (QS)</strong> – Integrationstests durch Key-User</div></div><div class="fa">↓ Export → Transport → Import</div><div class="fs2"><div class="fn" style="background:var(--coral-bg);color:var(--red-t)">3</div><div><strong>Produktivsystem</strong> – echtes Tagesgeschäft, nie direkt ändern!</div></div></div>`,'🚲 Entwickler programmiert neuen Bericht. Key-User testet. Transport ins Produktivsystem. Morgen nutzt Einkäufer den Bericht.'),
mk('Technologie','tech','Technologie','Was ist ein Berechtigungskonzept in SAP?','<strong>Berechtigungskonzept</strong>=regelt wer was im ERP tun darf. Schützt Datensicherheit und Datenschutz.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">U</div><div>Benutzer → bekommt Rollen</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">R</div><div>Rolle (z.B. Finanzbuchhalter) → enthält Aufgaben</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">A</div><div>Aufgabe → enthält Berechtigungen</div></div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green-mid)">B</div><div>Berechtigung = Anlegen/Lesen/Ändern/Löschen/Ausführen</div></div></div>`,'🚲 Finanzbuchhalter: anlegen+buchen. Controller: nur lesen. Lagerist: Wareneingänge buchen, keine Finanzdaten.'),
mk('Technologie','tech','Technologie','On-Premise vs. Cloud?','<strong>On-Premise</strong>=Software auf eigenen Servern. <strong>Cloud (SaaS)</strong>=externe Server, Zugriff über Internet.',`<table class="tb"><tr><th></th><th>On-Premise</th><th>Cloud</th></tr><tr><td>Kontrolle</td><td><span class="h hg">Voll</span></td><td><span class="h hr">Eingeschränkt</span></td></tr><tr><td>Kosten</td><td>Hohe Anfangsinvest.</td><td>Monatliche Lizenz</td></tr><tr><td>Skalierbarkeit</td><td>Begrenzt</td><td><span class="h hg">Flexibel</span></td></tr><tr><td>Datenschutz</td><td><span class="h hg">Intern</span></td><td>Provider</td></tr></table>`,'🚲 On-Premise: SAP auf eigenen Servern. Volle Kontrolle, teuer. Cloud: Updates automatisch, kein Serverteam nötig.'),
mk('Technologie','tech','Technologie','Was umfasst die Systemadministration?','<strong>Systemadministration</strong>=alle Aufgaben für reibungslosen ERP-Betrieb.',`<div class="br2"><span class="bg2" style="background:var(--green-bg);color:var(--green)">Benutzerverwaltung</span><span class="bg2" style="background:var(--purple-bg);color:var(--purple)">Berechtigungen</span><span class="bg2" style="background:var(--amber-bg);color:var(--amber)">Systemüberwachung</span><span class="bg2" style="background:var(--coral-bg);color:var(--coral)">Problembehebung</span><span class="bg2" style="background:var(--blue-bg);color:var(--blue)">Datenarchivierung</span></div>`,'🚲 Neuer Einkäufer: Benutzer anlegen, Rolle zuweisen. Montags Systemlast prüfen. Alte Belege archivieren.'),
// === PRÜFUNGSTHEMEN LAUT PROFESSOR ===
mk('📋 Prüfungsthemen','pruf','Stammdaten – Merkmale & Beispiele','Was sind Stammdaten und welche Merkmale haben sie? Nenne 5 Beispiele und ordne sie korrekt zu.','<strong>Stammdaten</strong> = langfristig gültige, stabile Grunddaten. Ändern sich selten, bilden Basis für alle Prozesse.',`<span class="h hg">Langlebig</span> <span class="h hg">Stabil</span> <span class="h hg">Wiederverwendbar</span><br><strong>Beispiele Stammdaten:</strong> Materialstamm, Kundenstamm, Lieferantenstamm, Stückliste (BOM), Arbeitsplan, Konditionen, Einkaufsinfosatz.<br><strong>KEIN Stammdatum:</strong> Bestellung, Wareneingang, Rechnung = Bewegungsdaten!`,'🚲 Merkhilfe: Stammdaten = WAS es gibt. Bewegungsdaten = WAS PASSIERT. Org.-Daten = WO / WOFÜR.'),
mk('📋 Prüfungsthemen','pruf','Bewegungsdaten – Merkmale & Beispiele','Was sind Bewegungsdaten? Welche Merkmale haben sie und welche Beispiele gibt es? Wie unterscheiden sie sich von Stammdaten?','<strong>Bewegungsdaten</strong> = transaktionsbezogene, kurzlebige Daten die bei jedem Geschäftsvorfall entstehen. Referenzieren immer Stammdaten.',`<span class="h hr">Kurzlebig</span> <span class="h hr">Laufend</span> <span class="h hr">Mengenmäßig groß</span><br><strong>Beispiele Bewegungsdaten:</strong> BAnf, Bestellung, Wareneingang, Wareneausgang, Rechnung, Fertigungsauftrag, Lieferschein, Inventurbeleg, Zahlungsbeleg.<br><strong>Unterschied:</strong> Stammdaten = bleiben jahrelang. Bewegungsdaten = entstehen täglich neu.`,'🚲 Kundenauftrag (Bewegung) verweist auf Kundenstamm + Materialstamm. Ohne Stammdaten keine Bewegungsdaten!'),
mk('📋 Prüfungsthemen','pruf','Organisationsdaten – Merkmale & Beispiele','Was sind Organisationsdaten? Nenne alle konkreten Elemente. Wie hängen sie mit Stamm- und Bewegungsdaten zusammen?','<strong>Organisationsdaten</strong> = strukturelle Stammdaten, die die Organisationsstruktur im ERP abbilden. Sehr selten geändert.',`<strong>Elemente (oben→unten):</strong><br><span class="h hp">Mandant</span> → <span class="h hg">Buchungskreis</span> → <span class="h ha">Werk</span> → <span class="h hr">Lagerort</span><br>+ Vertriebsorganisation, Einkaufsorganisation<br><strong>Zusammenhang:</strong> Org.-Daten = Rahmen. Stammdaten = immer mit Org.-Ebene. Bewegungsdaten referenzieren BEIDE.`,'🚲 Bestellung (Bewegung) → Lieferant 1001 (Stamm) → Einkaufsorg. 1000 (Org.) → Werk 1000 (Org.) → Lagerort 0001 (Org.).'),
mk('📋 Prüfungsthemen','pruf','Zuordnungsaufgabe: Datenschichten','KLAUSURAUFGABE: Ordne folgende Daten korrekt zu: Kundenauftrag, Materialstamm, Werk, Lieferschein, Stückliste, Lagerort, Wareneingang, Buchungskreis, Kundenstamm, Fertigungsauftrag.','<strong>Prüfungsklassiker:</strong> Alle 3 Datenschichten unterscheiden und konkrete Beispiele zuordnen können.', 
`<strong>📦 STAMMDATEN:</strong><br><span class="h hg">Materialstamm</span> <span class="h hg">Kundenstamm</span> <span class="h hg">Stückliste</span> <span class="h hg">Lieferantenstamm</span> <span class="h hg">Arbeitsplan</span><br><br><strong>🔄 BEWEGUNGSDATEN:</strong><br><span class="h hr">Kundenauftrag</span> <span class="h hr">Lieferschein</span> <span class="h hr">Wareneingang</span> <span class="h hr">Fertigungsauftrag</span> <span class="h hr">Rechnung</span><br><br><strong>🏢 ORGANISATIONSDATEN:</strong><br><span class="h hp">Werk</span> <span class="h hp">Lagerort</span> <span class="h hp">Buchungskreis</span> <span class="h hp">Mandant</span>`,
'🚲 Merkhilfe: STAMM=WAS existiert. BEWEGUNG=WAS PASSIERT. ORG.=WO/WOFÜR.'),
mk('📋 Prüfungsthemen','pruf','Belegprinzip & Belegflussprinzip','Was ist das Belegprinzip? Was ist der Belegfluss? Erkläre die vollständige Belegkette im Einkaufsprozess.','<strong>Belegprinzip</strong>=jede Buchung erzeugt zwingend einen Beleg. Kein Vorgang ohne Beleg. Belege können nicht gelöscht, nur storniert werden.',`<strong>Belegfluss Einkauf (Kette):</strong><br><div class="fl"><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">1</div><div>Bestellung (ME21N)</div></div><div class="fa">↓</div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">2</div><div>Materialbeleg – Wareneingang (MIGO)</div></div><div class="fa">↓</div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">3</div><div>Rechnungsbeleg (MIRO)</div></div><div class="fa">↓</div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">4</div><div>Zahlungsbeleg (FI)</div></div></div>Jeder Beleg verweist auf seinen Vorgänger!`,'🚲 Bestellung 4500001234 → WE-Beleg 4900012345 → RE-Beleg 5105678901 → Zahlungsbeleg 1400023456. Lückenlose Kette.'),
mk('📋 Prüfungsthemen','pruf','Datenherkunft im ERP','Woher kommen die Daten in den Belegen? Erkläre alle Quellen der Datenherkunft.','<strong>Datenherkunft</strong>=im ERP werden Belegdaten aus verschiedenen Quellen automatisch gezogen. Redundanz wird vermieden.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--purple-bg);color:var(--purple)">1</div><div><strong>Stammdaten</strong> – Preise, Adressen, Konten aus Material-/Lieferantenstamm</div></div><div class="fs2"><div class="fn" style="background:var(--purple-bg);color:var(--purple)">2</div><div><strong>Organisationsdaten</strong> – Werk, Lagerort, Buchungskreis</div></div><div class="fs2"><div class="fn" style="background:var(--purple-bg);color:var(--purple)">3</div><div><strong>Vorbelege</strong> – Folgebeleg übernimmt Daten aus Vorgänger ("Referenzierung")</div></div><div class="fs2"><div class="fn" style="background:var(--purple-bg);color:var(--purple)">4</div><div><strong>Manuelle Eingabe</strong> – nur Menge, spezifische Abweichungen</div></div></div>`,'🚲 Bestellung zieht Lieferantenadresse aus Stamm, Preis aus Konditionen, Buchungskreis aus Einkaufsorg. Nur Menge manuell!'),
mk('📋 Prüfungsthemen','pruf','Lagerort & Bestandsführung','Was ist ein Lagerort? Auf welcher Ebene erfolgt die Bestandsführung? Welche Bestandsarten gibt es?','<strong>Lagerort</strong>=physische Untereinheit des Werks. <strong>Bestandsführung</strong>=Verwaltung von Lagerbeständen auf Werk+Lagerort-Ebene.',`<strong>Werk</strong> → produziert, kauft ein, verkauft<br><strong>Lagerort</strong> → Untereinheit, differenziert Bestände<br><br><strong>Bestandsarten:</strong><br><span class="h hg">Unrestricted Use</span> – frei verfügbar<br><span class="h ha">Quality Inspection</span> – in Qualitätsprüfung<br><span class="h hr">Blocked Stock</span> – gesperrt, nicht verwendbar<br><span class="h hp">In Transit</span> – unterwegs zwischen Werken<br><span class="h hb">Consignment</span> – Eigentum des Lieferanten`,'🚲 Werk 1000 Worms → Lagerort 0001 (Hauptlager), 0002 (Sperrlager), 0003 (Fertigwarenlager). 100 Stück WE → QI-Bestand.'),
mk('📋 Prüfungsthemen','pruf','MRP I – Definition, Formel & Grenzen','Was ist MRP I? Erkläre die Logik, die Berechnungsformel und die Grenzen des Verfahrens.','<strong>MRP I (Material Requirements Planning)</strong>=mengenbasierte Bedarfsplanung zur Ermittlung von Materialbedarf aus dem Primärbedarf.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">1</div><div>Primärbedarf (Kundenauftrag/Absatzplan)</div></div><div class="fa">↓ Stücklistenauflösung</div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">2</div><div>Bruttobedarf</div></div><div class="fa">↓ − Lagerbestand − disponierter Zugang</div><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">3</div><div>Nettobedarf → Planauftrag/Bestellvorschlag</div></div></div><strong>Grenzen:</strong> Nur Mengen, <span class="h hr">keine Kapazitäten</span>, keine Ressourcen!`,'🚲 Bedarf: 100 Fahrräder. Stückliste: 2 Räder → Brutto: 200. Lager: 50 → Nettobedarf: 150 bestellen.'),
mk('📋 Prüfungsthemen','pruf','MRP II – Erweiterung & Unterschied zu MRP I','Was ist MRP II und wie erweitert es MRP I? Was ist der entscheidende Unterschied?','<strong>MRP II (Manufacturing Resource Planning)</strong>=Erweiterung von MRP I um Kapazitätsplanung und Ressourcensteuerung.',`<table class="tb"><tr><th></th><th>MRP I</th><th>MRP II</th></tr><tr><td>Mengenplanung</td><td><span class="h hg">Ja</span></td><td><span class="h hg">Ja</span></td></tr><tr><td>Kapazitätsplanung</td><td><span class="h hr">Nein</span></td><td><span class="h hg">Ja (CRP)</span></td></tr><tr><td>Rückkopplung</td><td><span class="h hr">Nein</span></td><td><span class="h hg">Ja</span></td></tr><tr><td>Finanzplanung</td><td><span class="h hr">Nein</span></td><td><span class="h hg">Ja</span></td></tr></table><strong>Kernunterschied:</strong> MRP I fragt "Was brauchen wir?" – MRP II fragt "Können wir das auch produzieren?"`,'🚲 MRP I: 1.000 Einheiten bestellen. MRP II: Prüfen ob Kapazität reicht → Maschine läuft 8h/Tag → nur 300 möglich → Plan anpassen!'),
mk('📋 Prüfungsthemen','pruf','MRP I → MRP II → ERP: Erweiterungsschritte','Erkläre die historischen Entwicklungsschritte von MRP I über MRP II zu ERP. Was kam jeweils neu dazu?','<strong>Entwicklung</strong>=schrittweiser Ausbau von reiner Materialplanung zur unternehmensweiten Integration.',`<div class="fl"><div class="fs2"><div class="fn" style="background:var(--green-bg);color:var(--green)">1</div><div><strong>MRP I (1960er)</strong> – Materialbedarfsplanung, Mengen+Termine, Stücklisten-Auflösung</div></div><div class="fa">+ Kapazitäten, Ressourcen, Rückkopplung, Finanz</div><div class="fs2"><div class="fn" style="background:var(--amber-bg);color:var(--amber)">2</div><div><strong>MRP II (1980er)</strong> – + Kapazitätsplanung (CRP), Ressourcen, Finanzplanung</div></div><div class="fa">+ alle Unternehmensbereiche, Echtzeit, Workflow</div><div class="fs2"><div class="fn" style="background:var(--purple-bg);color:var(--purple)">3</div><div><strong>ERP (1990er+)</strong> – + FI, CO, HR, SD, MM, PP, QM integriert, Echtzeit</div></div></div>`,'🚲 MRP I = Einkaufsliste. MRP II = Einkaufsliste + Stundenplan. ERP = ganzes Unternehmen vernetzt in einem System (SAP).'),
];

const CH=['Alle','MM: Grundlagen','MM: Organisation','MM: Stammdaten','MM: Prozesse','MM: Rechnungswesen','BPMN','ERM','ARIS','PPS: Grundlagen','PPS: Bevorratung','PPS: Stammdaten','PPS: MRP & Planung','PPS: Fertigungssteuerung','Technologie','📋 Prüfungsthemen'];

let deck=[...C],idx=0,flipped=false,known=[],filter='Alle';

function buildDeck(){
  deck=filter==='Alle'?[...C]:C.filter(c=>c.ch===filter);
  known=new Array(deck.length).fill(false);
  idx=0;
}

function buildPills(){
  const el=document.getElementById('pills');
  el.innerHTML='';
  CH.forEach(ch=>{
    const cnt=ch==='Alle'?C.length:C.filter(c=>c.ch===ch).length;
    const p=document.createElement('button');
    p.className='pill'+(ch===filter?' active':'');
    if(ch===filter){
      const c=deck[0];if(c){
        const col=PC[c.tg]||'#534AB7';
        p.style.background=col;
      }
    }
    p.textContent=ch+' ('+cnt+')';
    p.onclick=()=>{filter=ch;buildDeck();flipped=false;buildPills();render();};
    el.appendChild(p);
  });
}

function render(){
  if(!deck.length)return;
  const c=deck[idx];
  const ci=document.getElementById('card');
  ci.classList.toggle('flipped',flipped);
  const ts=TC[c.tg]||TC.pruf;
  const col=PC[c.tg]||'#534AB7';
  document.getElementById('ftag').style.cssText=ts;
  document.getElementById('ftag').textContent=c.tl;
  document.getElementById('fq').textContent=c.q;
  document.getElementById('back-body').innerHTML=`
    <div class="bsec"><div class="bsec-t">📖 Definition</div><div class="bdef">${c.def}</div></div>
    <div class="bsec"><div class="bsec-t">✅ Antwort</div><div class="bans">${c.ans}</div></div>
    <div class="bsec"><div class="bsec-t">💡 Beispiel</div><div class="bex">${c.ex}</div></div>`;
  document.getElementById('nav-txt').textContent='Karte '+(idx+1)+' / '+deck.length;
  const kn=known.filter(Boolean).length;
  document.getElementById('s-tot').textContent=deck.length;
  document.getElementById('s-kn').textContent=kn;
  document.getElementById('s-lft').textContent=deck.length-kn;
  const pct=Math.round((idx+1)/deck.length*100);
  document.getElementById('prog-fill')||0;
  document.querySelector('.prog-fill').style.width=pct+'%';
  document.querySelector('.prog-fill').style.background=col;
  document.getElementById('yes-btn').style.background=col;
}

function flip(){flipped=!flipped;document.getElementById('card').classList.toggle('flipped',flipped);}
function next(){idx=(idx+1)%deck.length;flipped=false;render();}
function prev(){idx=(idx-1+deck.length)%deck.length;flipped=false;render();}
function markYes(){known[idx]=true;setTimeout(()=>next(),180);}
function markNo(){known[idx]=false;next();}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')next();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')prev();
  if(e.key===' '){e.preventDefault();flip();}
});

// Swipe
let tx=0;
document.getElementById('card').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.getElementById('card').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){if(dx<0)next();else prev();}
  else flip();
},{passive:true});

document.getElementById('hcount').textContent=C.length+' Karten';
buildDeck();buildPills();render();
</script>
